name: Release

on:
  push:
    branches: [ main ]
    tags: [ 'v*' ]

permissions:
  contents: write

jobs:
  publish:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-dotnet@v4
        with:
          dotnet-version: 10.0.x

      - shell: pwsh
        run: |
          if ("${{ github.ref_type }}" -eq "tag") {
            $v = "${{ github.ref_name }}" -replace '^v'
            echo "VERSION=$v" >> $env:GITHUB_ENV
            echo "IS_PRERELEASE=false" >> $env:GITHUB_ENV
          } else {
            $run = $env:GITHUB_RUN_NUMBER
            $minor = [Math]::Floor($run / 100)
            $patch = $run % 100
            echo "VERSION=1.$minor.$patch" >> $env:GITHUB_ENV
            echo "IS_PRERELEASE=true" >> $env:GITHUB_ENV
          }

      - run: >
          dotnet publish AutoBrowser\AutoBrowser.csproj
          -c Release -f net10.0-windows
          -p:PublishSingleFile=true -p:Version=${{ env.VERSION }}
          --self-contained false
          -o publish\framework-dependent

      - run: >
          dotnet publish AutoBrowser\AutoBrowser.csproj
          -c Release -f net10.0-windows -r win-x64
          -p:PublishSingleFile=true -p:PublishTrimmed=false -p:Version=${{ env.VERSION }}
          --self-contained true
          -o publish\self-contained

      - shell: pwsh
        run: |
          $v = "${{ env.VERSION }}"
          Compress-Archive publish\framework-dependent\AutoBrowser.exe publish\AutoBrowser-$v-framework-dependent.zip
          Compress-Archive publish\self-contained\AutoBrowser.exe publish\AutoBrowser-$v-self-contained.zip

      - shell: pwsh
        run: |
          $tag = "v$env:VERSION"
          $prev = git describe --tags --abbrev=0 $tag^ 2>$null
          if (-not $prev) { $prev = "HEAD~3" }

          $log = git log "$prev..HEAD" --oneline --reverse
          $commits = ""
          foreach ($line in $log) {
            $hash, $msg = $line -split ' ', 2
            $url = "https://github.com/$env:GITHUB_REPOSITORY/commit/$hash"
            $commits += "- [$hash]($url) — $msg`n"
          }

          $body = @"
          ## AutoBrowser v$env:VERSION

          ### What's Changed

          $commits
          ### Downloads

          - **AutoBrowser-$env:VERSION-framework-dependent.zip** — requires .NET 10 runtime
          - **AutoBrowser-$env:VERSION-self-contained.zip** — standalone, no runtime needed
          "@

          Set-Content -Path "$env:RUNNER_TEMP/release-notes.md" -Value $body -Encoding utf8

      - uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ env.VERSION }}
          name: v${{ env.VERSION }}
          files: publish/AutoBrowser-*.zip
          body_path: ${{ runner.temp }}/release-notes.md
          prerelease: ${{ env.IS_PRERELEASE }}
